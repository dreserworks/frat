      </nav>

    </div>
  </header>

  <div class="menu-fullscreen" aria-hidden="true">
    <button class="menu-catcher" aria-label="Cerrar menú" tabindex="-1"></button>
    <div class="menu-left">
      <div class="top">
        <!-- LOGO FRAT — menú fullscreen -->
        <img src="assets/logo-white.png" alt="FRAT" class="logo-img" />
        <button class="close-btn">CLOSE</button>
      </div>
      <nav class="menu-nav">
        <div class="block">
          <div class="m-item"><span class="num">01</span><a href="lab.html" class="t">Lab</a></div>
          <div class="m-sub">
            <a href="lab-events.html">Events</a>
            <a href="lab-artelier.html">Artelier</a>
            <a href="lab-4u.html">4U</a>

          </div>

        <div class="block"><div class="m-item"><span class="num">02</span><a href="work.html" class="t">Work</a></div></div>
        <div class="block"><div class="m-item"><span class="num">03</span><a href="contact.html" class="t">Contact</a></div></div>
      </nav>
      <div class="social-row">
        <a href="#">INSTAGRAM</a> <span>|</span>
        <a href="#">FACEBOOK</a> <span>|</span>

      </div>
    </div>
  </div>


  <!-- ================================================================
       CONTACT  (ref: WEB_Contact — split 63/37 con columna foto)
       ================================================================ -->
  <section class="contact-split">

    <div class="c-left">
      <p class="kicker">Hablemos de tu próximo proyecto</p>
      <h1 class="c-title">Contact <span class="thin">us</span> <span class="arr">↖</span></h1>

      <div class="c-meta">
        <span class="cm"><span class="k">T</span><span class="pill">+57 317 473 0423</span></span>
        <span class="cm"><span class="k">L</span><span class="pill">Century 21 Racines (FRAT)</span></span>
        <span class="cm"><span class="k">C</span><span class="pill">info@frat.agency</span></span>
      </div>

      <form class="c-form" action="#" method="post">
        <div class="frow">
          <span class="flabel">Nombre</span>
          <input type="text" name="nombre" autocomplete="name" />
        </div>
        <div class="frow">
          <span class="flabel">Marca</span>
          <input type="text" name="marca" autocomplete="organization" />
        </div>
        <div class="frow">
          <span class="flabel">Teléfono</span>
          <input type="tel" name="telefono" autocomplete="tel" />
        </div>
        <div class="frow">
          <span class="flabel">Email</span>
          <input type="email" name="email" autocomplete="email" />
        </div>
        <textarea class="farea" name="idea" placeholder="Cuéntanos tu idea" aria-label="Cuéntanos tu idea"></textarea>

        <!-- Acción final: jerarquía por peso/escala/borde, sin color de marca -->
        <button type="submit" class="fsubmit">
          <span class="fs-label">Enviar mensaje</span>
          <span class="ar" aria-hidden="true">→</span>
        </button>
      </form>
    </div>

    <div class="c-right">
      <!-- IMAGEN FONDO CONTACTO — luces bokeh cálidas / cabina DJ -->
      <div class="ph bgph" data-label="Imagen fondo contacto"></div>
      <div class="stack">
        <!-- IMAGEN CONTACTO 01 — bola disco (portrait) -->
        <div class="ph" data-label="Imagen contacto 01"></div>
        <!-- IMAGEN CONTACTO 02 — activación de marca (portrait) -->
        <div class="ph" data-label="Imagen contacto 02"></div>
      </div>
    </div>

  </section>

  <script src="app.js"></script>
</body>
</html>
